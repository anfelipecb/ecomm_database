apiVersion: v1
kind: Namespace
metadata:
  name: ecomm-staging
  labels:
    environment: staging
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ecomm-staging-quota
  namespace: ecomm-staging
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
