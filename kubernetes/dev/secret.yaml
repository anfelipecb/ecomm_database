# Secrets for sensitive data - database credentials
# In production, use external secret management or sealed secrets
apiVersion: v1
kind: Secret
metadata:
  name: ecomm-db-secret
  namespace: ecomm-dev
type: Opaque
stringData:
  POSTGRES_DB: ecommerce
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: password
  DB_USER: postgres
  DB_PASSWORD: password
