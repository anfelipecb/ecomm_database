# Database deployment - PostgreSQL with init.sql from ecomm-database image
# Image tag is updated by Jenkins via: kubectl set image deployment/ecomm-database postgres=IMAGE:TAG
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecomm-database
  namespace: ecomm-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecomm-database
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ecomm-database
    spec:
      containers:
        - name: postgres
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: ecomm-db-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: ecomm-db-pvc
